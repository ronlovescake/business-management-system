services:
  - type: web
    name: business-management
    env: node
    rootDir: .
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx playwright install --with-deps chromium && npm run build
    startCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npm run start
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
    autoDeploy: true
    envVars:
