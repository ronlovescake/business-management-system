services:
  - type: web
    name: business-management
    env: node
    rootDir: .
    buildCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npm install && PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx playwright install --with-deps chromium && npm run build
    startCommand: >-
      bash -lc "
      set -e
      export PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright
      ls $PLAYWRIGHT_BROWSERS_PATH/chromium-*/chrome-linux/chrome >/dev/null 2>&1 || npx playwright install chromium
      npm run start
      "
    envVars:
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
    autoDeploy: true
    envVars:
