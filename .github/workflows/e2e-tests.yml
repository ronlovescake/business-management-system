name: E2E Tests

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Legacy browser engine guard
        run: npm run guard:no-legacy-browser-engine

      - name: Run ESLint
        run: npm run lint

  test:
    needs: lint
    timeout-minutes: 90
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: business_management_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Legacy browser engine guard
        run: npm run guard:no-legacy-browser-engine

      - name: Setup test environment
        run: |
          cp .env.example .env.test || touch .env.test
          echo "DATABASE_URL=postgresql://testuser:testpass@localhost:5433/business_management_test" >> .env.test
          echo "NEXTAUTH_URL=http://localhost:3100" >> .env.test
          echo "NEXTAUTH_SECRET=test-secret-key-for-ci-123456789012" >> .env.test
          echo "BYPASS_AUTH_FOR_TESTS=true" >> .env.test
          echo "PORT=3100" >> .env.test

      - name: Run database migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5433/business_management_test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e:chromium -- --workers=1
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5433/business_management_test
          NEXTAUTH_URL: http://localhost:3100
          NEXTAUTH_SECRET: test-secret-key-for-ci-123456789012
          PLAYWRIGHT_ENV_FILE: .env.test
          BYPASS_AUTH_FOR_TESTS: true
          PORT: 3100

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
