name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, feature/*]

jobs:
  quality:
    name: Guardrails + Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Guardrails check
        run: npm run guardrails:check

      - name: Legacy browser engine guard
        run: npm run guard:no-legacy-browser-engine

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Hardening tests
        run: npm run test:hardening
