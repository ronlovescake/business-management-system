services:
  db:
    image: postgres:16
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/run-postgres-with-pitr.sh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PITR_ENABLED: ${PITR_ENABLED:-false}
      PITR_ARCHIVE_TIMEOUT_SECONDS: ${PITR_ARCHIVE_TIMEOUT_SECONDS:-300}
      PITR_WAL_ARCHIVE_DIR: /backups/pitr/wal
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${BMS_DATA_ROOT}/postgres:/var/lib/postgresql/data
      - ${BMS_DATA_ROOT}/backup:/backups
      - ./scripts/docker/archive-wal.sh:/usr/local/bin/archive-wal.sh:ro
      - ./scripts/docker/run-postgres-with-pitr.sh:/usr/local/bin/run-postgres-with-pitr.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        BUILD_NEXTAUTH_URL: ${NEXTAUTH_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      BACKUP_DIR: /backups
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      LOG_ALL_QUERIES: ${LOG_ALL_QUERIES:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-}
      SENTRY_PROJECT: ${SENTRY_PROJECT:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      GOOGLE_DRIVE_FOLDER_ID: ${GOOGLE_DRIVE_FOLDER_ID:-}
      GOOGLE_CLIENT_EMAIL: ${GOOGLE_CLIENT_EMAIL:-}
      GOOGLE_PRIVATE_KEY: ${GOOGLE_PRIVATE_KEY:-}
      INTERNAL_JOB_TOKEN: ${INTERNAL_JOB_TOKEN:-}
      BACKUP_STRICT_TABLES: ${BACKUP_STRICT_TABLES:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_AUTO_TIME: ${BACKUP_AUTO_TIME:-22:00}
      BACKUP_AUTO_CADENCE: ${BACKUP_AUTO_CADENCE:-weekly}
      BACKUP_AUTO_DAY_OF_WEEK: ${BACKUP_AUTO_DAY_OF_WEEK:-sunday}
      BACKUP_DIFF_AUTO_TIME: ${BACKUP_DIFF_AUTO_TIME:-12:00}
      BACKUP_AUTO_TIMEZONE: ${BACKUP_AUTO_TIMEZONE:-Asia/Manila}
      BMS_DATA_ROOT: ${BMS_DATA_ROOT}
      PITR_ENABLED: ${PITR_ENABLED:-false}
      PITR_BASE_AUTO_ENABLED: ${PITR_BASE_AUTO_ENABLED:-false}
      PITR_BASE_AUTO_TIME: ${PITR_BASE_AUTO_TIME:-01:00}
    ports:
      - "${APP_PORT:-5000}:5000"
    volumes:
      - ${BMS_DATA_ROOT}/backup:/backups
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        BUILD_NEXTAUTH_URL: ${NEXTAUTH_URL}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command: ["node", "scripts/run-backup-scheduler.js"]
    environment:
      INTERNAL_JOB_TOKEN: ${INTERNAL_JOB_TOKEN:-}
      BACKUP_AUTO_ENABLED: ${BACKUP_AUTO_ENABLED:-false}
      BACKUP_AUTO_TIME: ${BACKUP_AUTO_TIME:-22:00}
      BACKUP_AUTO_CADENCE: ${BACKUP_AUTO_CADENCE:-weekly}
      BACKUP_AUTO_DAY_OF_WEEK: ${BACKUP_AUTO_DAY_OF_WEEK:-sunday}
      BACKUP_DIFF_AUTO_ENABLED: ${BACKUP_DIFF_AUTO_ENABLED:-false}
      BACKUP_DIFF_AUTO_TIME: ${BACKUP_DIFF_AUTO_TIME:-12:00}
      BACKUP_DIFF_AUTO_FORMAT: ${BACKUP_DIFF_AUTO_FORMAT:-json}
      BACKUP_AUTO_TIMEZONE: ${BACKUP_AUTO_TIMEZONE:-Asia/Manila}
      BACKUP_AUTO_URL: http://app:5000/api/internal/backup/run
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      PITR_BASE_AUTO_ENABLED: ${PITR_BASE_AUTO_ENABLED:-false}
      PITR_BASE_AUTO_TIME: ${PITR_BASE_AUTO_TIME:-01:00}
      PITR_BASE_AUTO_URL: http://app:5000/api/internal/backup/pitr/run

  restore-runner:
    build:
      context: .
      dockerfile: Dockerfile.restore-runner
    restart: unless-stopped
    environment:
      BACKUP_DIR: /backups
      ENV_FILE: /app/.env.docker
      RESTORE_RUNNER_POLL_MS: ${RESTORE_RUNNER_POLL_MS:-5000}
    volumes:
      - ${BMS_DATA_ROOT}/backup:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./.env.docker:/app/.env.docker:ro