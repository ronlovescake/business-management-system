<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Notification Sound</title>
</head>
<body>
    <h1>Notification Sound Generator</h1>
    <p>This page generates a simple notification sound. Click the button to create and download it.</p>
    <button onclick="generateSound()">Generate & Download Sound</button>
    <button onclick="testSound()">Test Sound</button>
    
    <script>
        let audioBlob = null;
        
        function generateSound() {
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const sampleRate = audioContext.sampleRate;
            const duration = 0.4; // 400ms
            const numSamples = sampleRate * duration;
            
            // Create offline audio context for rendering
            const offlineContext = new OfflineAudioContext(1, numSamples, sampleRate);
            
            // Create two oscillators for a pleasant notification sound
            const osc1 = offlineContext.createOscillator();
            const osc2 = offlineContext.createOscillator();
            
            // Create gain nodes for envelope
            const gainNode1 = offlineContext.createGain();
            const gainNode2 = offlineContext.createGain();
            const masterGain = offlineContext.createGain();
            
            // Set frequencies (a pleasant double-beep)
            osc1.frequency.value = 800; // High note
            osc2.frequency.value = 600; // Lower note
            
            // Set oscillator types
            osc1.type = 'sine';
            osc2.type = 'sine';
            
            // Create envelope (attack-decay)
            const now = offlineContext.currentTime;
            gainNode1.gain.setValueAtTime(0, now);
            gainNode1.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gainNode1.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            
            gainNode2.gain.setValueAtTime(0, now + 0.15);
            gainNode2.gain.linearRampToValueAtTime(0.3, now + 0.2);
            gainNode2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            
            masterGain.gain.value = 0.5;
            
            // Connect nodes
            osc1.connect(gainNode1);
            osc2.connect(gainNode2);
            gainNode1.connect(masterGain);
            gainNode2.connect(masterGain);
            masterGain.connect(offlineContext.destination);
            
            // Start oscillators
            osc1.start(0);
            osc2.start(0.15);
            
            // Stop oscillators
            osc1.stop(0.2);
            osc2.stop(0.4);
            
            // Render audio
            offlineContext.startRendering().then(function(buffer) {
                // Convert to WAV
                const wav = audioBufferToWav(buffer);
                audioBlob = new Blob([wav], { type: 'audio/wav' });
                
                // Download
                const url = URL.createObjectURL(audioBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'notification.wav';
                a.click();
                URL.revokeObjectURL(url);
                
                alert('Sound generated and downloaded as notification.wav\n\nYou can convert it to MP3 using an online converter or ffmpeg:\nffmpeg -i notification.wav -codec:a libmp3lame -b:a 128k notification.mp3');
            });
        }
        
        function testSound() {
            if (!audioBlob) {
                alert('Please generate the sound first!');
                return;
            }
            
            const url = URL.createObjectURL(audioBlob);
            const audio = new Audio(url);
            audio.play();
        }
        
        // Convert AudioBuffer to WAV
        function audioBufferToWav(buffer) {
            const numChannels = buffer.numberOfChannels;
            const sampleRate = buffer.sampleRate;
            const format = 1; // PCM
            const bitDepth = 16;
            
            const bytesPerSample = bitDepth / 8;
            const blockAlign = numChannels * bytesPerSample;
            
            const data = buffer.getChannelData(0);
            const dataLength = data.length * bytesPerSample;
            const bufferLength = 44 + dataLength;
            
            const arrayBuffer = new ArrayBuffer(bufferLength);
            const view = new DataView(arrayBuffer);
            
            // Write WAV header
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataLength, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * blockAlign, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitDepth, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataLength, true);
            
            // Write audio data
            floatTo16BitPCM(view, 44, data);
            
            return arrayBuffer;
        }
        
        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }
        
        function floatTo16BitPCM(view, offset, input) {
            for (let i = 0; i < input.length; i++, offset += 2) {
                const s = Math.max(-1, Math.min(1, input[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
        }
    </script>
</body>
</html>
